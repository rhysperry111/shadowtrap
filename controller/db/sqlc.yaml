version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema:  "schema.sql"
    gen:
      go:
        package:          "db"
        out:              "."
        emit_json_tags:   true
        emit_interface:   true
        sql_driver:       "pgx/v5"
        overrides:
          - db_type: "timestamptz"
            go_type:  "time.Time"
          - db_type: "jsonb"
            go_type:  "encoding/json.RawMessage"
